version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    container_name: portfolio-app-dev
    volumes:
      # Mount source code for development
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev